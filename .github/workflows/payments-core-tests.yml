name: Payments Core CI

on:
  push:
    paths:
      - 'packages/payments-core/**'
  pull_request:
    paths:
      - 'packages/payments-core/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.1
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run payments-core tests
        run: pnpm --filter ./packages/payments-core test
